version: '3.9'

services:
  fenicsx-backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: foundry-fenicsx-backend:latest
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - ./backend/uploads:/workspace/backend/uploads
    restart: unless-stopped
